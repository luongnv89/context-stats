# .gitissue.yml
# Auto-generated by /init-gitissue
# Language: Python     Framework: -
# Test runner: pytest     Repo size: medium (218 files)
#
# See: references/docs/config-schema.md for full schema

version: 1

resolve:
  # Branch name prefix for issue branches (e.g., "issue-42")
  branch_prefix: 'issue-{id}'

  # Commit message prefix for issue commits (e.g., "fix #42")
  commit_prefix: 'fix'

  # Base branch for issue branches
  base_branch: main

  # Test timeout in seconds. Increase for large projects
  test_timeout: 300

  # Whether to run tests automatically after resolution
  auto_test: true

  # Whether to create a draft PR after resolution
  auto_pr: true

triage:
  # Days of inactivity after which an issue is considered stale
  stale_threshold_days: 14

  # Whether auto-pilot can close stale issues
  can_close_stale: false

review:
  # Checklist items to review
  checklist:
    - code_quality
    - test_coverage
    - no_dead_code
    - no_console_logs
    - no_sensitive_data

pr:
  # Title template
  title_template: '{type}: {title}'

  # PR body template
  body_template: |
    ## Description

    Closes #{id}

    {checklist}

  # Draft PR title
  draft_title_template: '[WIP] {type}: {title}'

issue:
  # Template to use for new issues
  # Note: .github/ISSUE_TEMPLATE/ found (2 templates)
  # Set template to ".github/ISSUE_TEMPLATE" to use your existing templates
  template: default

naming:
  # Branch naming convention
  branches: kebab-case

  # Commit message style
  commits: sentence-case

# Conventional commit scope (e.g., "api", "ui")
commit_scope: ''

# Squash merge PRs
squash: false

# Auto-pilot gate — 'all' or a specific check name
auto_pilot_gate: all

# Display theme for comments
theme: default
